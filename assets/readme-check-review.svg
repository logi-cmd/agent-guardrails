  <text x="128" y="54" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">agent-guardrails check --base-ref HEAD~1 --commands-run &quot;npm test&quot; --review</text>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">
<text x="34" y="86" fill="#d8dee9">Agent Guardrails check result</text>
