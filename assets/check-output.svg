<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <rect width="1200" height="600" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="28" font-weight="700">Check Output — Review Mode</text>
  
  <!-- Terminal Window -->
  <g transform="translate(100, 70)" filter="url(#shadow)">
    <rect x="0" y="0" width="1000" height="500" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    
    <!-- Title bar -->
    <rect x="0" y="0" width="1000" height="36" rx="10" fill="#161b22"/>
    <rect x="0" y="18" width="1000" height="18" fill="#161b22"/>
    <circle cx="20" cy="18" r="6" fill="#ff5f56"/>
    <circle cx="40" cy="18" r="6" fill="#ffbd2e"/>
    <circle cx="60" cy="18" r="6" fill="#27c93f"/>
    <text x="500" y="23" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="13">agent-guardrails check --review</text>
    
    <!-- Terminal content -->
    <text x="20" y="70" fill="#58a6ff" font-family="monospace" font-size="14">Agent Guardrails Check Results</text>
    <text x="20" y="95" fill="#8b949e" font-family="monospace" font-size="13">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>
    
    <!-- Verdict -->
    <text x="20" y="125" fill="#3fb950" font-family="monospace" font-size="15" font-weight="bold">✓ Verdict: pass — Safe to merge</text>
    
    <!-- Summary -->
    <text x="20" y="160" fill="#8b949e" font-family="monospace" font-size="13">Preset: node-service  |  Diff: working tree  |  Files changed: 8</text>
    <text x="20" y="180" fill="#8b949e" font-family="monospace" font-size="13">Source files: 3  |  Test files: 2  |  Config files: 3</text>
    
    <text x="20" y="215" fill="#8b949e" font-family="monospace" font-size="13">Scope:        ✓ All changes within allowed paths</text>
    <text x="20" y="235" fill="#8b949e" font-family="monospace" font-size="13">Tests:        ✓ All required commands passed</text>
    <text x="20" y="255" fill="#8b949e" font-family="monospace" font-size="13">Consistency:  ✓ No parallel abstraction detected</text>
    <text x="20" y="275" fill="#8b949e" font-family="monospace" font-size="13">Continuity:   ✓ No state-management regression</text>
    
    <!-- Warnings -->
    <text x="20" y="315" fill="#d29922" font-family="monospace" font-size="13">⚠ Warnings (2):</text>
    <text x="20" y="340" fill="#d29922" font-family="monospace" font-size="13">  • Source-to-test relevance is weak for lib/utils.js</text>
    <text x="20" y="360" fill="#d29922" font-family="monospace" font-size="13">  • Changed 5 top-level areas (recommended max: 3)</text>
    
    <!-- Mutation testing -->
    <text x="20" y="400" fill="#8b949e" font-family="monospace" font-size="13">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>
    <text x="20" y="425" fill="#a78bfa" font-family="monospace" font-size="14">🧬 Mutation Testing (optional)</text>
    <text x="20" y="450" fill="#8b949e" font-family="monospace" font-size="13">  Status:     disabled (default)</text>
    <text x="20" y="470" fill="#8b949e" font-family="monospace" font-size="13">  Enable:     checks.mutation.enabled = true</text>
    <text x="20" y="490" fill="#8b949e" font-family="monospace" font-size="13">  Requires:   checks.mutation.testCommand</text>
    
    <text x="20" y="530" fill="#8b949e" font-family="monospace" font-size="13">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>
    <text x="20" y="555" fill="#3fb950" font-family="monospace" font-size="14">✓ All basic checks passed. Review warnings before merge.</text>
  </g>
</svg>
