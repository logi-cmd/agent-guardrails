<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="1200" height="500" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="28" font-weight="700">Core Workflow</text>
  
  <!-- Step 1: Setup -->
  <g transform="translate(60, 100)" filter="url(#shadow)">
    <rect x="0" y="0" width="220" height="340" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <rect x="0" y="0" width="220" height="50" rx="12" fill="url(#cyan)"/>
    <rect x="0" y="25" width="220" height="25" fill="url(#cyan)"/>
    <text x="110" y="33" text-anchor="middle" fill="#0f172a" font-family="system-ui, sans-serif" font-size="18" font-weight="700">1. Setup</text>
    <text x="20" y="80" fill="#94a3b8" font-family="monospace" font-size="13">agent-guardrails setup</text>
    <text x="20" y="100" fill="#94a3b8" font-family="monospace" font-size="13">  --agent claude-code</text>
    <line x1="20" y1="115" x2="200" y2="115" stroke="#334155" stroke-width="1"/>
    <text x="20" y="140" fill="#34d399" font-family="system-ui, sans-serif" font-size="13">✅ config.json</text>
    <text x="20" y="165" fill="#34d399" font-family="system-ui, sans-serif" font-size="13">✅ AGENTS.md</text>
    <text x="20" y="190" fill="#34d399" font-family="system-ui, sans-serif" font-size="13">✅ pre-commit hook</text>
    <text x="20" y="215" fill="#34d399" font-family="system-ui, sans-serif" font-size="13">✅ MCP server</text>
    <text x="20" y="240" fill="#34d399" font-family="system-ui, sans-serif" font-size="13">✅ Agent adapter files</text>
    <text x="20" y="265" fill="#34d399" font-family="system-ui, sans-serif" font-size="13">✅ Git hooks</text>
    <text x="20" y="300" fill="#64748b" font-family="system-ui, sans-serif" font-size="12">5 agents supported</text>
  </g>
  
  <!-- Arrow 1-2 -->
  <path d="M280 270 L320 270" stroke="#475569" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#475569"/></marker></defs>
  
  <!-- Step 2: Enforce -->
  <g transform="translate(320, 100)" filter="url(#shadow)">
    <rect x="0" y="0" width="220" height="340" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <rect x="0" y="0" width="220" height="50" rx="12" fill="url(#purple)"/>
    <rect x="0" y="25" width="220" height="25" fill="url(#purple)"/>
    <text x="110" y="33" text-anchor="middle" fill="#0f172a" font-family="system-ui, sans-serif" font-size="18" font-weight="700">2. Enforce</text>
    <text x="20" y="80" fill="#94a3b8" font-family="monospace" font-size="13">agent-guardrails</text>
    <text x="20" y="100" fill="#94a3b8" font-family="monospace" font-size="13">  enforce --all</text>
    <line x1="20" y1="115" x2="200" y2="115" stroke="#334155" stroke-width="1"/>
    <text x="20" y="140" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="13">⭐⭐⭐ Claude Code</text>
    <text x="20" y="165" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="13">⭐⭐⭐ Cursor</text>
    <text x="20" y="190" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="13">⭐⭐⭐ OpenCode</text>
    <text x="20" y="215" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="13">⭐⭐⭐ Codex</text>
    <text x="20" y="240" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="13">⭐⭐⭐ Gemini</text>
    <text x="20" y="280" fill="#64748b" font-family="system-ui, sans-serif" font-size="12">System-level injection</text>
  </g>
  
  <!-- Arrow 2-3 -->
  <path d="M540 270 L580 270" stroke="#475569" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 3: AI Codes -->
  <g transform="translate(580, 100)" filter="url(#shadow)">
    <rect x="0" y="0" width="220" height="340" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <rect x="0" y="0" width="220" height="50" rx="12" fill="url(#amber)"/>
    <rect x="0" y="25" width="220" height="25" fill="url(#amber)"/>
    <text x="110" y="33" text-anchor="middle" fill="#0f172a" font-family="system-ui, sans-serif" font-size="18" font-weight="700">3. AI Codes</text>
    <text x="20" y="80" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">Developer gives task</text>
    <text x="20" y="100" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">AI agent writes code</text>
    <line x1="20" y1="115" x2="200" y2="115" stroke="#334155" stroke-width="1"/>
    <text x="20" y="140" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="13">🤖 Follows AGENTS.md</text>
    <text x="20" y="165" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="13">🤖 Respects scope</text>
    <text x="20" y="190" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="13">🤖 Runs check before</text>
    <text x="20" y="215" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="13">    finish</text>
    <text x="20" y="250" fill="#64748b" font-family="system-ui, sans-serif" font-size="12">Guardrails auto-trigger</text>
  </g>
  
  <!-- Arrow 3-4 -->
  <path d="M800 270 L840 270" stroke="#475569" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 4: Check & Merge -->
  <g transform="translate(840, 100)" filter="url(#shadow)">
    <rect x="0" y="0" width="220" height="340" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <rect x="0" y="0" width="220" height="50" rx="12" fill="url(#green)"/>
    <rect x="0" y="25" width="220" height="25" fill="url(#green)"/>
    <text x="110" y="33" text-anchor="middle" fill="#0f172a" font-family="system-ui, sans-serif" font-size="18" font-weight="700">4. Check &amp; Merge</text>
    <text x="20" y="80" fill="#94a3b8" font-family="monospace" font-size="13">agent-guardrails</text>
    <text x="20" y="100" fill="#94a3b8" font-family="monospace" font-size="13">  check --review</text>
    <line x1="20" y1="115" x2="200" y2="115" stroke="#334155" stroke-width="1"/>
    <text x="20" y="140" fill="#34d399" font-family="system-ui, sans-serif" font-size="13">✅ Scope check</text>
    <text x="20" y="165" fill="#34d399" font-family="system-ui, sans-serif" font-size="13">✅ Test verification</text>
    <text x="20" y="190" fill="#34d399" font-family="system-ui, sans-serif" font-size="13">✅ Drift detection</text>
    <text x="20" y="215" fill="#34d399" font-family="system-ui, sans-serif" font-size="13">✅ Protected paths</text>
    <text x="20" y="240" fill="#34d399" font-family="system-ui, sans-serif" font-size="13">🧬 Mutation testing</text>
    <text x="20" y="270" fill="#64748b" font-family="system-ui, sans-serif" font-size="12">Verdict: pass/fail/block</text>
  </g>
</svg>
