<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="350" fill="#0f172a" rx="12"/>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="18" font-weight="bold">Rough-Intent Mode</text>
  <text x="300" y="50" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="12">From vague idea to safe contract in seconds</text>

  <!-- User Input Box -->
  <rect x="50" y="70" width="200" height="60" fill="#1e293b" rx="8" stroke="#4f46e5" stroke-width="2"/>
  <text x="150" y="95" text-anchor="middle" fill="#a78bfa" font-family="system-ui" font-size="11">User says:</text>
  <text x="150" y="115" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12" font-weight="bold">"加个登录功能"</text>

  <!-- Arrow -->
  <path d="M260 100 L300 100" stroke="#7c3aed" stroke-width="2" fill="none" marker-end="url(#arrow2)"/>
  <defs>
    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- AI Brain -->
  <rect x="310" y="70" width="100" height="60" fill="#1e293b" rx="8" stroke="#10b981" stroke-width="2"/>
  <text x="360" y="100" text-anchor="middle" fill="#10b981" font-family="system-ui" font-size="12">🧠 AI</text>
  <text x="360" y="115" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">Inferring...</text>

  <!-- Arrow -->
  <path d="M420 100 L460 100" stroke="#7c3aed" stroke-width="2" fill="none" marker-end="url(#arrow2)"/>

  <!-- Output Box -->
  <rect x="470" y="70" width="100" height="60" fill="#1e293b" rx="8" stroke="#f59e0b" stroke-width="2"/>
  <text x="520" y="95" text-anchor="middle" fill="#f59e0b" font-family="system-ui" font-size="11">Contract:</text>
  <text x="520" y="115" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="10">✓ 73% confidence</text>

  <!-- Inference Details -->
  <rect x="50" y="150" width="500" height="180" fill="#1e293b" rx="8"/>

  <text x="70" y="175" fill="#7c3aed" font-family="system-ui" font-size="12" font-weight="bold">Inferred Contract:</text>

  <!-- Items -->
  <text x="70" y="200" fill="#10b981" font-family="system-ui" font-size="11">✓ Task Type: auth</text>
  <text x="70" y="220" fill="#10b981" font-family="system-ui" font-size="11">✓ Allowed Paths: src/auth/, src/middleware/, src/services/</text>
  <text x="70" y="240" fill="#10b981" font-family="system-ui" font-size="11">✓ Test Command: npm test</text>
  <text x="70" y="260" fill="#10b981" font-family="system-ui" font-size="11">✓ Risk Level: medium (involves authentication)</text>
  <text x="70" y="280" fill="#10b981" font-family="system-ui" font-size="11">✓ Guard Rules: password must be encrypted, no .env changes</text>

  <!-- Confidence Bar -->
  <rect x="70" y="295" width="200" height="12" fill="#374151" rx="6"/>
  <rect x="70" y="295" width="146" height="12" fill="url(#purpleGrad)" rx="6"/>
  <text x="280" y="305" fill="#a78bfa" font-family="system-ui" font-size="10">73%</text>

  <!-- Action Buttons -->
  <rect x="350" y="285" width="80" height="30" fill="#10b981" rx="6"/>
  <text x="390" y="305" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="11" font-weight="bold">✓ Accept</text>

  <rect x="440" y="285" width="80" height="30" fill="#374151" rx="6"/>
  <text x="480" y="305" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="11">Modify</text>
</svg>
