<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" fill="url(#bg)" rx="12"/>

  <!-- AI Agent Box -->
  <rect x="30" y="100" width="140" height="80" fill="#2d3748" rx="8" stroke="#4f46e5" stroke-width="2"/>
  <text x="100" y="135" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14" font-weight="bold">AI Agent</text>
  <text x="100" y="155" text-anchor="middle" fill="#a0aec0" font-family="system-ui" font-size="11">Claude / Cursor</text>

  <!-- Arrow 1 -->
  <path d="M180 140 L240 140" stroke="url(#accent)" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- Guardrails Box -->
  <rect x="250" y="80" width="180" height="120" fill="#2d3748" rx="8" stroke="#10b981" stroke-width="2"/>
  <text x="340" y="110" text-anchor="middle" fill="#10b981" font-family="system-ui" font-size="14" font-weight="bold">agent-guardrails</text>
  <text x="340" y="135" text-anchor="middle" fill="#a0aec0" font-family="system-ui" font-size="11">✓ Scope Check</text>
  <text x="340" y="152" text-anchor="middle" fill="#a0aec0" font-family="system-ui" font-size="11">✓ Test Validation</text>
  <text x="340" y="169" text-anchor="middle" fill="#a0aec0" font-family="system-ui" font-size="11">✓ Drift Detection</text>

  <!-- Arrow 2 -->
  <path d="M440 140 L500 140" stroke="url(#accent)" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- Result Box -->
  <rect x="510" y="100" width="140" height="80" fill="#2d3748" rx="8" stroke="#f59e0b" stroke-width="2"/>
  <text x="580" y="130" text-anchor="middle" fill="#f59e0b" font-family="system-ui" font-size="14" font-weight="bold">Merge Gate</text>
  <text x="580" y="150" text-anchor="middle" fill="#a0aec0" font-family="system-ui" font-size="11">Safe to merge?</text>

  <!-- Arrow 3 -->
  <path d="M660 140 L720 140" stroke="url(#accent)" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- Repo Box -->
  <rect x="680" y="50" width="100" height="200" fill="#2d3748" rx="8" stroke="#06b6d4" stroke-width="2"/>
  <text x="730" y="80" text-anchor="middle" fill="#06b6d4" font-family="system-ui" font-size="12" font-weight="bold">Your</text>
  <text x="730" y="95" text-anchor="middle" fill="#06b6d4" font-family="system-ui" font-size="12" font-weight="bold">Repo</text>
  <text x="730" y="130" text-anchor="middle" fill="#a0aec0" font-family="system-ui" font-size="10">src/</text>
  <text x="730" y="150" text-anchor="middle" fill="#a0aec0" font-family="system-ui" font-size="10">tests/</text>
  <text x="730" y="170" text-anchor="middle" fill="#a0aec0" font-family="system-ui" font-size="10">.env</text>
  <text x="730" y="190" text-anchor="middle" fill="#a0aec0" font-family="system-ui" font-size="10">config/</text>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="18" font-weight="bold">How agent-guardrails works</text>

  <!-- Labels -->
  <text x="210" y="125" text-anchor="middle" fill="#7c3aed" font-family="system-ui" font-size="9">writes</text>
  <text x="470" y="125" text-anchor="middle" fill="#7c3aed" font-family="system-ui" font-size="9">checks</text>
  <text x="690" y="125" text-anchor="middle" fill="#7c3aed" font-family="system-ui" font-size="9">✓/✗</text>
</svg>
